let playing = false;
let currentIndex = 0;
let animFrame = null;
let timerVal = 80;
let timerInterval = null;

function resetReplay() {
  playing = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (timerInterval) clearInterval(timerInterval);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  currentIndex = 0;
  timerVal = 80;
  timerEl.textContent = timerVal;
  wordDisplay.textContent = "_ _ _ _";
  progressFill.style.width = '0%';
  statusEl.textContent = 'Premi Play per vedere il disegno dal pcap...';
  document.getElementById('btnPlay').disabled = false;
}

function drawSegment(seg) {
  const [x1, y1, x2, y2] = seg;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function startReplay() {
  if (playing) return;
  playing = true;
  document.getElementById('btnPlay').disabled = true;
  statusEl.textContent = 'Riproduzione in corso...';

  // Timer simulato
  timerInterval = setInterval(() => {
    if (timerVal > 0) timerVal--;
    timerEl.textContent = timerVal;
  }, 1000);

  const speed = parseInt(document.getElementById('speed').value);

  if (speed === 0) {
    // Istantaneo
    segments.forEach(seg => drawSegment(seg));
    wordDisplay.textContent = "_ a r _";
    progressFill.style.width = '100%';
    statusEl.textContent = `✅ Disegno completato! (${segments.length} segmenti)`;
    clearInterval(timerInterval);
    return;
  }

  const delay = Math.max(1, Math.floor(16 / speed));

  function step() {
    if (!playing) return;

    // Disegna N segmenti per frame in base alla velocità
    const batchSize = speed;
    for (let i = 0; i < batchSize && currentIndex < segments.length; i++) {
      // Controlla eventi parola
      wordEvents.forEach(ev => {
        if (currentIndex === ev.atSegment) {
          wordDisplay.textContent = ev.word;
        }
      });

      drawSegment(segments[currentIndex]);
      currentIndex++;
    }

    // Aggiorna progress bar
    progressFill.style.width = (currentIndex / segments.length * 100) + '%';
    statusEl.textContent = `Segmento ${currentIndex} / ${segments.length}`;

    if (currentIndex < segments.length) {
      animFrame = requestAnimationFrame(step);
    } else {
      playing = false;
      clearInterval(timerInterval);
      statusEl.textContent = `✅ Replay completato! Leggi la flag nel disegno.`;
      wordDisplay.textContent = "_ a r _";
    }
  }

  animFrame = requestAnimationFrame(step);
}
